services:
  - type: web
    name: fb-taverns-reconcile
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webapp:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: AIRTABLE_TOKEN
        sync: false
      - key: AIRTABLE_BASE_ID
        sync: false
      # Legacy HTTP Basic — kept through the dual-mode cutover window only.
      # At cutover the operator removes WEB_PASSWORD and sets
      # LEGACY_BASIC_FALLBACK=false (a later commit deletes the dead Basic code).
      - key: WEB_USERNAME
        value: admin
      - key: WEB_PASSWORD
        sync: false
      # --- Supabase auth (per-user drinks roles via user_app_roles, RLS) ---
      # The drinks app holds ONLY the public anon key + URL — never the
      # service-role key. anon key is public by design but kept sync:false so
      # it's set per-environment in the dashboard, not committed.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      # Dual-mode ON during cutover; operator sets "false" at cutover.
      - key: LEGACY_BASIC_FALLBACK
        value: "true"
      # Non-secret: unified admin area linked from the no-access page (tenancy enforces its own gate).
      - key: TENANCY_ADMIN_URL
        value: https://tenancy-master.onrender.com/admin
      # Shared bearer token for GET /api/deal-products (the tenancy hub's Deal
      # Generator price feed). Set the SAME value on the tenancy-master
      # service; unset = the endpoint answers 503 and the hub falls back to
      # Excel import / manual lines.
      - key: DEAL_PRODUCTS_TOKEN
        sync: false
